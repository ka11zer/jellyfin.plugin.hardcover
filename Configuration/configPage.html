<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hardcover Settings</title>
</head>
<body>
    <div data-role="page" id="hardcoverConfigPage">
        <div data-role="header">
            <h2>Hardcover Settings</h2>
        </div>
        <div data-role="content">
            <div class="ui-field-contain">
                <label for="txtApiKey">API Key:</label>
                <input type="text" id="txtApiKey" name="ApiKey" />
                <div id="errorMsg" style="color:red;"></div>
            </div>
            <button type="submit" id="btnSave">Save</button>
        </div>

        <script>
            var page = document.getElementById('hardcoverConfigPage');
            page.addEventListener('pageshow', function () {
                Dashboard.getPluginConfiguration('Hardcover').then(config => {
                    document.getElementById('txtApiKey').value = config.ApiKey || '';
                });
            });

            document.getElementById('btnSave').addEventListener('click', function () {
                var config = {
                    ApiKey: document.getElementById('txtApiKey').value
                };
                Dashboard.savePluginConfiguration('Hardcover', config).then(() => {
                    Dashboard.alert('Settings saved.');
                }).catch(err => {
                    document.getElementById('errorMsg').innerText = 'Failed to save.';
                    console.error(err);
                });
            });
        </script>
    </div>
</body>
</html>
