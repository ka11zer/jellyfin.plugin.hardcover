name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Publish
      run: dotnet publish -c Release -o ./publish

    - name: Zip the Plugin
      run: |
        cd publish
        zip -r ../Jellyfin.Plugin.Hardcover.zip ./*

    - name: Update manifest.json
      run: |
        # Capture the input version and strip the 'v' for the manifest
        RAW_VERSION="${{ github.event.inputs.version }}"
        CLEAN_VERSION=${RAW_VERSION#v}
        DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${RAW_VERSION}/Jellyfin.Plugin.Hardcover.zip"

        # Use jq to prepend the new version block to the versions array
        jq --arg v "$CLEAN_VERSION" \
           --arg d "$DATE" \
           --arg u "$ZIP_URL" \
           '.[0].versions = [{"version": $v, "date": $d, "changelog": "Update \($v)", "targetAbi": "10.9.0.0", "sourceUrl": $u}] + .[0].versions' \
           manifest.json > tmp.json && mv tmp.json manifest.json

    - name: Commit and Push Updated Manifest
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add manifest.json
        git commit -m "chore: Update manifest.json for ${{ github.event.inputs.version }}"
        git push

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        generate_release_notes: true
        files: Jellyfin.Plugin.Hardcover.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
