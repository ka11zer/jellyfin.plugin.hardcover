name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g., v1.1.2)'
        required: true
        default: 'v1.1.2'
      target_abi:
        description: 'Jellyfin Target ABI (Must be 10.11.0.0 for Jellyfin 10.11.x servers)'
        required: true
        default: '10.11.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # Upgraded runner to .NET 9
        dotnet-version: '9.0.x' 

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Publish
      run: dotnet publish -c Release -o ./publish

    - name: Zip the Plugin
      run: |
        cd publish
        zip -r ../Jellyfin.Plugin.Hardcover.zip ./*

    - name: Update manifest.json
      run: |
        RAW_VERSION="${{ github.event.inputs.version }}"
        CLEAN_VERSION=${RAW_VERSION#v}
        TARGET_ABI="${{ github.event.inputs.target_abi }}"
        
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        CHECKSUM=$(md5sum Jellyfin.Plugin.Hardcover.zip | awk '{ print $1 }')
        ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${RAW_VERSION}/Jellyfin.Plugin.Hardcover.zip"

        jq --arg v "$CLEAN_VERSION" \
           --arg t "$TIMESTAMP" \
           --arg u "$ZIP_URL" \
           --arg c "$CHECKSUM" \
           --arg abi "$TARGET_ABI" \
           '.[0].versions = [{"version": $v, "timestamp": $t, "changelog": "Release \($v)", "targetAbi": $abi, "sourceUrl": $u, "checksum": $c}] + .[0].versions' \
           manifest.json > tmp.json && mv tmp.json manifest.json

    - name: Commit and Push Updated Manifest
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add manifest.json
        git commit -m "chore: Update manifest.json for ${{ github.event.inputs.version }}"
        git push

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        generate_release_notes: true
        files: Jellyfin.Plugin.Hardcover.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
